<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">

    <!-- Fonts -->

<body>

    <!-- Skeleton loader -->
    <div class="skeleton-loader" data-loader>
        <!-- Navbar skeleton -->
        <div class="skeleton-nav">
            <div class="skeleton-bone" style="width:120px;height:20px;border-radius:6px"></div>
            <div class="d-flex gap-3">
                <div class="skeleton-bone" style="width:50px;height:14px;border-radius:6px"></div>
                <div class="skeleton-bone" style="width:50px;height:14px;border-radius:6px"></div>
                <div class="skeleton-bone" style="width:50px;height:14px;border-radius:6px"></div>
                <div class="skeleton-bone" style="width:50px;height:14px;border-radius:6px"></div>
                <div class="skeleton-bone" style="width:36px;height:36px;border-radius:50%"></div>
            </div>
        </div>
        <!-- Hero skeleton -->
        <div class="skeleton-hero">
            <div class="skeleton-bone" style="width:180px;height:18px;border-radius:8px;margin-bottom:12px"></div>
            <div class="skeleton-bone" style="width:400px;max-width:90%;height:40px;border-radius:10px;margin-bottom:20px"></div>
            <div class="skeleton-bone" style="width:320px;max-width:80%;height:14px;border-radius:6px;margin-bottom:8px"></div>
            <div class="skeleton-bone" style="width:280px;max-width:70%;height:14px;border-radius:6px;margin-bottom:24px"></div>
            <div class="d-flex justify-content-center gap-2">
                <div class="skeleton-bone" style="width:160px;height:32px;border-radius:100px"></div>
                <div class="skeleton-bone" style="width:140px;height:32px;border-radius:100px"></div>
            </div>
        </div>
    </div>

    <!-- Scroll progress -->
    <div class="scroll-progress" data-progress></div>

    <!-- Theme transition overlay -->
    <div class="theme-overlay" data-theme-overlay></div>

    <div id="navbar"></div>
    <div id="hero"></div>
    <div id="about"></div>
    <div id="skills"></div>
    <div id="project"></div>
    <div id="contact"></div>
    <div id="footer"></div>

    <script src="assets/js/include.js"></script>
    <script src="assets/js/theme.js"></script>
    <script src="assets/js/scroll.js"></script>
    <script src="assets/js/animate.js"></script>
    <script src="assets/js/extras.js"></script>

</body>

</html>
